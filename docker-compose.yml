services:
  db:
    image: postgres:17.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathbot
      POSTGRES_USER: mathbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathbot -d mathbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mathbot:${POSTGRES_PASSWORD:-change-me}@db:5432/mathbot
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && exec python -m app.main"]

volumes:
  postgres_data:

