tips:
  "1": "The number stays the same."
  "2": "Double the number."
  "3": "Double the number, then add it once more."
  "4": "Double twice."
  "5": "Answers end in 0 or 5."
  "6": "Use ×5 and add one more group."
  "7": "Split difficult facts into ×5 and ×2."
  "8": "Double three times."
  "9": "The tens rise while the units fall; product digits add to 9."
  "10": "Add a zero."
hard_facts:
  6x6: "6 × 6 = 36 — think 5 sixes, then one more."
  6x7: "6 × 7 = 42 — 6 × 5 plus two more sixes."
  6x8: "6 × 8 = 48 — 3 × 8 doubled."
  7x7: "7 × 7 = 49 — one less than 7 × 8."
  7x8: "7 × 8 = 56 — remember 5, 6, 7, 8."
  8x8: "8 × 8 = 64 — double 8 three times."
story.mul:
  - "There are {groups} boxes with {size} pencils in each. How many pencils are there?"
  - "Lena has {groups} packets with {size} stickers in each. How many stickers does she have?"
  - "A shelf has {groups} rows of {size} books. How many books are there?"
  - "There are {groups} teams with {size} players each. How many players are there?"
  - "A garden has {groups} rows with {size} flowers in each. How many flowers are there?"
  - "There are {groups} plates with {size} biscuits on each. How many biscuits are there?"
  - "Mira builds {groups} towers using {size} blocks each. How many blocks does she use?"
  - "There are {groups} bags with {size} marbles in each. How many marbles are there?"
  - "A teacher sets out {groups} trays with {size} cards on each. How many cards are there?"
  - "There are {groups} pages with {size} stars on each page. How many stars are there?"
  - "A rack holds {groups} pairs of {size} skates. How many skates are shown?"
  - "There are {groups} nests with {size} eggs in each. How many eggs are there?"
  - "A wall has {groups} rows with {size} tiles in each. How many tiles are there?"
  - "There are {groups} jars with {size} buttons in each. How many buttons are there?"
  - "Sam draws {groups} groups of {size} circles. How many circles does Sam draw?"
story.div:
  - "There are {total} pencils shared equally among {groups} boxes. How many pencils go in each box?"
  - "Lena shares {total} stickers equally among {groups} packets. How many stickers go in each packet?"
  - "There are {total} books placed in {groups} equal rows. How many books are in each row?"
  - "There are {total} players split into {groups} equal teams. How many players are on each team?"
  - "A gardener puts {total} flowers into {groups} equal rows. How many flowers are in each row?"
  - "There are {total} biscuits on {groups} equal plates. How many biscuits are on each plate?"
  - "Mira uses {total} blocks for {groups} equal towers. How many blocks are in each tower?"
  - "There are {total} marbles in {groups} equal bags. How many marbles are in each bag?"
  - "A teacher puts {total} cards on {groups} equal trays. How many cards are on each tray?"
  - "There are {total} stars across {groups} equal pages. How many stars are on each page?"
  - "There are {total} skates arranged on {groups} equal racks. How many skates are on each rack?"
  - "There are {total} eggs in {groups} equal nests. How many eggs are in each nest?"
  - "A wall has {total} tiles in {groups} equal rows. How many tiles are in each row?"
  - "There are {total} buttons in {groups} equal jars. How many buttons are in each jar?"
  - "Sam splits {total} circles into {groups} equal groups. How many circles are in each group?"
