tips:
  "1": "При умножении на 1 число не меняется."
  "2": "Удвой число."
  "3": "Сначала удвой число, затем прибавь его ещё один раз."
  "4": "Удвой число два раза."
  "5": "Ответ оканчивается на 0 или 5."
  "6": "Умножь на 5 и прибавь ещё одну такую группу."
  "7": "Раздели трудный пример на умножение на 5 и на 2."
  "8": "Удвой число три раза."
  "9": "Десятки растут, единицы уменьшаются, а сумма цифр ответа равна 9."
  "10": "Припиши ноль."

hard_facts:
  6x6: "6 × 6 = 36 — представь пять шестёрок и ещё одну."
  6x7: "6 × 7 = 42 — это 6 × 5 и ещё две шестёрки."
  6x8: "6 × 8 = 48 — удвой результат 3 × 8."
  7x7: "7 × 7 = 49 — на 7 меньше, чем 7 × 8."
  7x8: "7 × 8 = 56 — запомни последовательность 5, 6, 7, 8."
  8x8: "8 × 8 = 64 — удвой восьмёрку три раза."

